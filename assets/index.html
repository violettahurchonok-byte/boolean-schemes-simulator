<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Симулятор логічних схем</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.min.js"></script>
</head>
<body>
  <h1>Симулятор логічних схем</h1>
  <input type="text" id="booleanInput" placeholder="Введіть булеву функцію">
<button onclick="buildScheme()">Побудувати схему</button>


  <div id="controls">
    <button onclick="addVariable()">Додати змінну</button>
    <button onclick="addOperation('AND')">І</button>
    <button onclick="addOperation('OR')">АБО</button>
    <button onclick="addOperation('NOT')">НЕ</button>
    <button onclick="runSimulation()">Запустити імпульс</button>
  </div>

  <div id="workspace"></div>

  <script src="script.js"></script>
</body>
</html>
